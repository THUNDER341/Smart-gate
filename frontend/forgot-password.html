<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Smart Gate</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="portal-wrapper">
        <!-- Header -->
        <header class="portal-header">
            <div class="brand-wrap">
                <img src="./assets/rru-logo.png" alt="RRU Logo" class="logo">
                <div class="header-text">
                    <h1>Reset Password</h1>
                    <p class="subtitle">Smart Gate Management System</p>
                </div>
            </div>
            <a href="landing.html" class="btn-back">← Back to Home</a>
        </header>

        <main class="portal-main">
            <div class="login-container">
                <h2>Forgot Password?</h2>
                <p style="text-align: center; color: #666; margin-bottom: 2rem;">Enter your registered email address and we'll send you a link to reset your password.</p>
                
                <form id="forgotPasswordForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="Enter your registered email" required>
                    </div>
                    
                    <button type="submit" class="btn">Send Reset Link</button>
                </form>
                
                <div id="statusMessage" class="status-message"></div>
                
                <div class="footer-links">
                    <p>Remembered your password? <a href="guard-login.html">Back to Login</a></p>
                </div>
            </div>
        </main>
    </div>

    <script src="firebase-auth.js?v=3"></script>
    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const statusDiv = document.getElementById('statusMessage');
            
            try {
                statusDiv.textContent = 'Sending reset email...';
                statusDiv.className = 'status-message';
                statusDiv.style.display = 'block';
                
                // Use Firebase to send password reset email
                await window.firebaseAuth.sendPasswordReset(email);
                
                statusDiv.textContent = '✓ Password reset link sent! Please check your inbox (and spam folder).';
                statusDiv.className = 'status-message success';
                statusDiv.style.display = 'block';
                
                // Clear form
                document.getElementById('forgotPasswordForm').reset();
            } catch (error) {
                statusDiv.textContent = `✗ Error: ${error.message}`;
                statusDiv.className = 'status-message error';
                statusDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
