<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Host Registration - Smart Gate</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="portal-container">
        <!-- Header -->
        <header class="portal-header">
            <div class="brand-wrap">
                <img src="./assets/rru-logo.png" alt="RRU Logo" class="logo">
                <div class="header-text">
                    <h1>Host Registration</h1>
                    <p class="subtitle">Smart Gate Management System</p>
                </div>
            </div>
            <a href="host-login.html" class="btn-back">← Back to Login</a>
        </header>
        </header>

        <main class="portal-main">
            <div class="register-container">
                <form id="hostRegisterForm">
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input 
                    type="text" 
                    id="name" 
                    placeholder="Your full name" 
                    required
                    autocomplete="name"
                >
            </div>
            
            <div class="form-group">
                <label for="email">Email Address *</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="your.email@rru.ac.in" 
                    required
                    autocomplete="email"
                >
            </div>
            
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input 
                    type="tel" 
                    id="phone" 
                    placeholder="10-digit mobile number" 
                    maxlength="10"
                    autocomplete="tel"
                >
            </div>
            
            <div class="form-group">
                <label for="password">Password *</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Create a strong password (min 6 characters)" 
                    required
                    autocomplete="new-password"
                >
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirm Password *</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    placeholder="Confirm your password" 
                    required
                    autocomplete="new-password"
                >
            </div>
            
            <div class="note">
                ℹ️ You will need to verify your email before you can log in.
            </div>
            
            <button type="submit" class="btn">Register as Host</button>
        </form>
        
        <div id="statusMessage" class="status-message"></div>
        
        <div class="back-link">
            <a href="host-login.html">Already have an account? Login here</a>
        </div>
        <div class="back-link">
            <a href="landing.html">← Back to Home</a>
        </div>
    </div>

    <script src="firebase-auth.js?v=3"></script>
    <script>
        document.getElementById('hostRegisterForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const phone = document.getElementById('phone').value.trim();
            const statusDiv = document.getElementById('statusMessage');
            
            // Validate inputs
            if (password.length < 6) {
                statusDiv.textContent = 'Password must be at least 6 characters long';
                statusDiv.className = 'status-message error';
                statusDiv.style.display = 'block';
                return;
            }
            
            if (password !== confirmPassword) {
                statusDiv.textContent = 'Passwords do not match';
                statusDiv.className = 'status-message error';
                statusDiv.style.display = 'block';
                return;
            }
            
            try {
                statusDiv.textContent = 'Registering...';
                statusDiv.className = 'status-message';
                statusDiv.style.display = 'block';
                
                const result = await window.firebaseAuth.register(
                    name, 
                    email, 
                    password, 
                    phone, 
                    'host'
                );
                
                statusDiv.textContent = '✓ Registration successful! A verification email has been sent to your inbox. Please verify your email and then login.';
                statusDiv.className = 'status-message success';
                statusDiv.style.display = 'block';
                
                // Clear form
                document.getElementById('hostRegisterForm').reset();
                
                // Redirect after 3 seconds
                setTimeout(() => {
                    window.location.href = 'host-login.html';
                }, 3000);
            } catch (error) {
                statusDiv.textContent = `✗ Registration failed: ${error.message}`;
                statusDiv.className = 'status-message error';
                statusDiv.style.display = 'block';
            }
        });
    </script>
</main>
</div>
</body>
</html>
