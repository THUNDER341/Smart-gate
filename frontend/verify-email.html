<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification - Smart Gate</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #001F3F, #003d7a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
        }
        h1 {
            color: #001F3F;
            margin-bottom: 10px;
        }
        .status {
            padding: 20px;
            border-radius: 8px;
            margin: 30px 0;
        }
        .status.loading {
            background: #e7f3ff;
            color: #004085;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .message {
            font-size: 18px;
            margin-bottom: 10px;
        }
        .details {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
            font-weight: 600;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #0056b3;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #007bff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏢</div>
        <h1>Email Verification</h1>
        
        <div id="statusBox" class="status loading">
            <div class="spinner"></div>
            <p class="message">Verifying your email...</p>
            <p class="details">Please wait while we verify your account</p>
        </div>
        
        <div id="actionBox" style="display: none;">
            <a href="host-login.html" class="btn">Go to Login</a>
        </div>
    </div>

    <script>
        // Get token from URL params
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        const statusBox = document.getElementById('statusBox');
        const actionBox = document.getElementById('actionBox');

        if (!token) {
            statusBox.className = 'status error';
            statusBox.innerHTML = `
                <div class="icon">❌</div>
                <p class="message">Invalid Verification Link</p>
                <p class="details">The verification link is missing or invalid. Please check your email for the correct link.</p>
            `;
        } else {
            // Verify email with backend
            fetch(`http://localhost:5000/api/auth/firebase/verify-email/${token}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        statusBox.className = 'status success';
                        statusBox.innerHTML = `
                            <div class="icon">✅</div>
                            <p class="message">Email Verified Successfully!</p>
                            <p class="details">Your account has been verified. You can now login to Smart Gate.</p>
                        `;
                        actionBox.style.display = 'block';
                    } else {
                        throw new Error(data.message || 'Verification failed');
                    }
                })
                .catch(error => {
                    statusBox.className = 'status error';
                    statusBox.innerHTML = `
                        <div class="icon">❌</div>
                        <p class="message">Verification Failed</p>
                        <p class="details">${error.message || 'The verification link has expired or is invalid. Please request a new verification email.'}</p>
                    `;
                });
        }
    </script>
</body>
</html>
